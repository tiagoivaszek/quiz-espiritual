<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Espiritual</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 12px;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 25px;
    background: #020617;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

button {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

.hidden { display: none; }

.progress {
    height: 6px;
    background: #1e293b;
    border-radius: 10px;
    margin-bottom: 15px;
}

.progress-bar {
    height: 6px;
    background: #22c55e;
    width: 0%;
}
</style>
</head>

<body>

<div class="container">

<div id="start">
    <h1>Descubra em qual morada espiritual você está</h1>
    <p>Leva menos de 1 minuto</p>
    <button onclick="startQuiz()">Começar</button>
</div>

<div id="quiz" class="hidden">
    <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<div id="loading" class="hidden">
    <h2>Analisando suas respostas...</h2>
</div>

<div id="capture" class="hidden">
    <h2>Seu resultado está pronto 👇</h2>

    <input type="text" id="name" placeholder="Seu nome">
    <input type="text" id="whatsapp" placeholder="Ex: (43) 99900-0067">

    <button onclick="showResult()">Ver resultado</button>
</div>

<div id="result" class="hidden">
    <h2 id="resultTitle"></h2>

    <p><strong>🧭 Diagnóstico</strong></p>
    <p id="resultDiagnostico"></p>

    <p><strong>⚠️ Risco</strong></p>
    <p id="resultRisco"></p>

    <p><strong>💬</strong></p>
    <p id="resultFrase"></p>

    <p style="margin-top:15px;">
        O caminho não aparece aqui porque ele é personalizado.  
        Me chama no WhatsApp que eu te explico 👇
    </p>

    <button id="whatsButton">Quero meu caminho agora</button>
</div>

<div id="thankyou" class="hidden">
    <h2>🙏 Perfeito!</h2>
    <p>Agora me chama no WhatsApp 👇</p>
</div>

</div>

<script>

const questions = [
{
q: "Como está sua vida de oração?",
a: [
"Quase não rezo",
"Rezo às vezes, mas sem constância",
"Rezo com frequência e esforço",
"Minha oração flui com certa facilidade"
]
},
{
q: "Sua relação com o pecado:",
a: [
"Vivo caindo e nem sempre luto",
"Tento lutar, mas caio com frequência",
"Evito pecados graves, mas ainda caio",
"Tenho maior domínio e vigilância"
]
},
{
q: "Quando você cai:",
a: [
"Nem sempre me arrependo",
"Me arrependo, mas continuo repetindo",
"Luto para não repetir",
"Caio pouco e me levanto rápido"
]
},
{
q: "Sobre o mundo e distrações:",
a: [
"Me dominam facilmente",
"Me atraem bastante",
"Consigo resistir na maioria das vezes",
"Têm pouca força sobre mim"
]
},
{
q: "Na sua oração, você sente que:",
a: [
"Depende totalmente de mim começar",
"Preciso me forçar muito para rezar",
"Consigo manter com esforço",
"Sinto que Deus me conduz"
]
},
{
q: "Sua vida espiritual hoje:",
a: [
"Confusa e desorganizada",
"Instável, com altos e baixos",
"Organizada e disciplinada",
"Profunda e interior"
]
},
{
q: "Autoconhecimento:",
a: [
"Quase não reflito sobre mim",
"Começo a perceber meus erros",
"Já identifico padrões",
"Me conheço e busco corrigir"
]
},
{
q: "Sua decisão de mudar:",
a: [
"Ainda não decidi de verdade",
"Quero mudar, mas estou dividido",
"Já tomei decisões concretas",
"Busco fidelidade diária"
]
},
{
q: "Sua relação com Deus:",
a: [
"Distante",
"Começando a se aproximar",
"Já existe relacionamento",
"Busco intimidade profunda"
]
},
{
q: "O que mais define seu momento atual:",
a: [
"Apego ao mundo",
"Luta constante",
"Estabilidade espiritual",
"Busca profunda por Deus"
]
}
];

let current = 0;
let score = {A:0, B:0, C:0, D:0};

function startQuiz() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
}

function showQuestion() {

    let percent = (current / questions.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";

    let q = questions[current];
    document.getElementById("question").innerText = q.q;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.a.forEach((answer, index) => {
        let btn = document.createElement("button");
        btn.innerText = answer;

        btn.onclick = () => {
            if(index === 0) score.A++;
            if(index === 1) score.B++;
            if(index === 2) score.C++;
            if(index === 3) score.D++;

            current++;

            if(current < questions.length){
                showQuestion();
            } else {
                finishQuiz();
            }
        };

        answersDiv.appendChild(btn);
    });
}

function finishQuiz() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("loading").classList.remove("hidden");

    setTimeout(() => {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("capture").classList.remove("hidden");
    }, 1500);
}

function showResult() {

    let maior = Math.max(score.A, score.B, score.C, score.D);

    let titulo = "";
    let diagnostico = "";
    let risco = "";
    let frase = "";

    if(maior === score.A){
        titulo = "1ª Morada";
        diagnostico = "Você ainda está muito ligado ao mundo e com pouca vida interior.";
        risco = "Pode permanecer anos sem crescer espiritualmente.";
        frase = "Você não está longe de Deus. Você só ainda não entrou dentro de si.";
    }
    else if(maior === score.B){
        titulo = "2ª Morada";
        diagnostico = "Você já começou a buscar Deus, mas vive uma luta constante.";
        risco = "Desânimo e desistência.";
        frase = "A luta é sinal de que Deus já está te chamando.";
    }
    else if(maior === score.C){
        titulo = "3ª Morada";
        diagnostico = "Você tem vida espiritual organizada e disciplinada.";
        risco = "Achar que já está bem e parar de crescer.";
        frase = "Você já avançou muito… mas ainda não chegou no centro.";
    }
    else {
        titulo = "4ª Morada";
        diagnostico = "Você entrou em uma fase mais profunda, onde Deus começa a agir mais diretamente na sua alma.";
        risco = "Tentar controlar tudo e não corresponder à ação de Deus.";
        frase = "Agora não é mais só você buscando Deus… é Deus te puxando.";
    }

    const nome = document.getElementById("name").value;
    const whatsapp = document.getElementById("whatsapp").value;

    if(!nome || !whatsapp){
        alert("Preencha os dados");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbzZ1vVwX4v3MSloF29Jfs-k1kSLrgWdG4piQeeYhMfC88YBWELwbKsEQszvHPQEL-zv/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ nome, whatsapp, resultado: titulo })
    });

    let mensagem = encodeURIComponent(`Estou na ${titulo} e quero meu caminho`);
    let link = `https://wa.me/5543999000676?text=${mensagem}`;

    document.getElementById("capture").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("resultTitle").innerText = titulo;
    document.getElementById("resultDiagnostico").innerText = diagnostico;
    document.getElementById("resultRisco").innerText = risco;
    document.getElementById("resultFrase").innerText = frase;

    document.getElementById("whatsButton").onclick = function() {
        window.open(link, "_blank");
        document.getElementById("result").classList.add("hidden");
        document.getElementById("thankyou").classList.remove("hidden");
    };
}

</script>

</body>
</html>
